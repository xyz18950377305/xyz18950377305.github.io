<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>404</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        h1 {
            color: skyblue; /* 标题颜色 */
            text-align: center; /* 居中对齐 */
            font-size: 48px; /* 增大字体大小 */
        }
        p {
            text-align: center; /* 居中对齐 */
            font-size: 18px; /* 字体大小 */
            color: #333; /* 文本颜色 */
        }
        a {
            color: deepskyblue; /* 链接颜色 */
            text-decoration: none; /* 去掉下划线 */
            font-size: 18px; /* 字体大小 */
            transition: color 0.3s; /* 颜色过渡效果 */
        }
        a:hover {
            color: dodgerblue; /* 鼠标悬停时的链接颜色 */
        }
    </style>
    <meta http-equiv="refresh" content="3;url=/">
</head>
<body>
    <h1>404</h1>
    <p>
        页面找不到, 将在3秒后跳转到
        <a href="/">首页</a>
    </p>
    </div>
</body>
</html>
